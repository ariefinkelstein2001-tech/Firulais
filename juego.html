<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FIRULAIS RUNNER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Bebas Neue',sans-serif;overflow:hidden;user-select:none}
  h1{color:#FEE04A;font-size:clamp(24px,5vw,42px);letter-spacing:6px;margin-bottom:12px;text-align:center}
  #wrap{position:relative;width:min(800px,100vw);aspect-ratio:800/320}
  canvas{width:100%;height:100%;display:block;border-radius:12px;border:4px solid #222;box-shadow:0 0 0 2px #FEE04A}
  #legend{color:#F4E6E2;font-size:clamp(11px,2vw,15px);letter-spacing:2px;margin-top:10px;opacity:.6;text-align:center}
  #back{color:#FEE04A;font-size:14px;letter-spacing:3px;margin-top:16px;text-decoration:none;opacity:.7;border:2px solid #FEE04A;padding:8px 20px;border-radius:50px}
  #back:hover{opacity:1}
</style>
</head>
<body>
<h1>🐾 FIRULAIS RUNNER</h1>
<div id="wrap"><canvas id="c"></canvas></div>
<p id="legend">🍋 LIMÓN = 5 PTS &nbsp;·&nbsp; 🧂 SAL = 10 PTS &nbsp;·&nbsp; SALTA LAS VALLAS · ESPACIO / TAP</p>
<a href="index.html" id="back">← VOLVER</a>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = 800, H = 320, GROUND = 262;
cv.width = W; cv.height = H;

const C = {y:'#FEE04A',r:'#CA1720',t:'#007078',d:'#111111',cr:'#F4E6E2',w:'#ffffff',g:'#FEE04A'};

let state, raf;

function newState(){
  return {
    started:false, over:false, running:false,
    dog:{x:90,y:GROUND-64,vy:0,grnd:true},
    obs:[], items:[], score:0, hi:0,
    speed:5, frame:0, nextObs:90, nextItem:60,
    clouds:[{x:200,y:40,s:0.4},{x:500,y:25,s:0.3},{x:680,y:55,s:0.5}]
  };
}
state = newState();

function drawDog(d, fr){
  const {x,y} = d;
  const t = fr*0.28;
  const l1 = d.grnd ? Math.sin(t)*10 : 0;
  const l2 = -l1;

  // shadow
  ctx.save();
  ctx.globalAlpha=0.13;
  ctx.fillStyle=C.d;
  ctx.beginPath();
  ctx.ellipse(x+28,GROUND+4,26,6,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  // back legs
  ctx.lineWidth=8; ctx.lineCap='round'; ctx.strokeStyle=C.d;
  ctx.beginPath(); ctx.moveTo(x+14,y+40); ctx.lineTo(x+10,y+58+l1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+20,y+40); ctx.lineTo(x+16,y+58+l2); ctx.stroke();
  // front legs
  ctx.beginPath(); ctx.moveTo(x+38,y+40); ctx.lineTo(x+44,y+58+l2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+44,y+40); ctx.lineTo(x+50,y+58+l1); ctx.stroke();

  // shoes
  ctx.fillStyle=C.t;
  ctx.beginPath(); ctx.roundRect(x+4,y+54+l1,18,8,4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x+38,y+54+l2,18,8,4); ctx.fill();

  // body
  ctx.fillStyle=C.cr; ctx.strokeStyle=C.d; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.roundRect(x+10,y+18,42,34,10); ctx.fill(); ctx.stroke();

  // tail
  ctx.strokeStyle=C.d; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x+12,y+26);
  ctx.quadraticCurveTo(x-8,y+12, x+0,y+2+Math.sin(t*1.4)*10);
  ctx.stroke();

  // head
  ctx.fillStyle=C.cr; ctx.strokeStyle=C.d; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(x+42,y+14,20,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // ear
  ctx.fillStyle=C.d;
  ctx.beginPath(); ctx.ellipse(x+27,y+20,7,15,-0.35,0,Math.PI*2); ctx.fill();

  // cap
  ctx.fillStyle=C.t; ctx.strokeStyle=C.d; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(x+26,y-4,32,13,[5,5,0,0]); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(x+20,y+8,40,8,[0,0,4,4]); ctx.fill(); ctx.stroke();

  // shades / eye
  ctx.fillStyle=C.d;
  ctx.beginPath(); ctx.roundRect(x+34,y+10,14,8,3); ctx.fill();
  // shine
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.roundRect(x+36,y+12,4,3,2); ctx.fill();

  // nose
  ctx.fillStyle=C.d;
  ctx.beginPath(); ctx.ellipse(x+59,y+18,7,5,0,0,Math.PI*2); ctx.fill();

  // arm + tray
  ctx.strokeStyle=C.cr; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(x+48,y+26); ctx.lineTo(x+70,y+22); ctx.stroke();
  ctx.fillStyle=C.cr; ctx.strokeStyle=C.d; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x+62,y+18,22,5,2); ctx.fill(); ctx.stroke();
}

function drawHurdle(o){
  // posts
  ctx.fillStyle=C.d;
  ctx.fillRect(o.x,o.y+14,9,o.h-14);
  ctx.fillRect(o.x+o.w-9,o.y+14,9,o.h-14);
  // bar
  ctx.fillStyle=C.r;
  ctx.beginPath(); ctx.roundRect(o.x-2,o.y,o.w+4,13,4); ctx.fill();
  // stripes
  ctx.fillStyle='rgba(255,255,255,0.25)';
  for(let i=0;i<3;i++) ctx.fillRect(o.x+8+i*8,o.y+2,4,9);
}

function drawLemon(it){
  ctx.save();
  ctx.translate(it.x,it.y);
  // body
  ctx.fillStyle='#FFE040'; ctx.strokeStyle=C.d; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(0,0,17,12,0.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // tip
  ctx.fillStyle='#FFE040';
  ctx.beginPath(); ctx.ellipse(16,0,5,4,0,0,Math.PI*2); ctx.fill();
  // leaf
  ctx.fillStyle='#4CAF50';
  ctx.beginPath(); ctx.ellipse(2,-13,5,4,-0.4,0,Math.PI*2); ctx.fill();
  // shine
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.ellipse(-5,-3,5,3,0.4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawSalt(it){
  ctx.save();
  ctx.translate(it.x,it.y);
  // body
  ctx.fillStyle=C.w; ctx.strokeStyle=C.d; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(-9,-20,18,26,[4,4,3,3]); ctx.fill(); ctx.stroke();
  // cap
  ctx.fillStyle='#ddd'; ctx.strokeStyle=C.d; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(-7,-27,14,9,[4,4,0,0]); ctx.fill(); ctx.stroke();
  // holes
  ctx.fillStyle=C.t;
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.arc(-3+i*3,-10,2,0,Math.PI*2); ctx.fill();
  }
  // label stripe
  ctx.fillStyle=C.t; ctx.globalAlpha=0.25;
  ctx.fillRect(-9,-5,18,8);
  ctx.restore();
}

function drawBg(){
  // sky
  ctx.fillStyle=C.y;
  ctx.fillRect(0,0,W,H);
  // dots
  ctx.fillStyle='rgba(202,23,32,0.07)';
  for(let i=14;i<W;i+=28) for(let j=14;j<GROUND;j+=28){
    ctx.beginPath(); ctx.arc(i,j,2,0,Math.PI*2); ctx.fill();
  }
  // ground
  ctx.fillStyle=C.d; ctx.fillRect(0,GROUND+2,W,H-GROUND);
  ctx.fillStyle=C.cr; ctx.fillRect(0,GROUND+2,W,3);
  // ground dots
  ctx.fillStyle='rgba(255,255,255,0.06)';
  for(let i=20;i<W;i+=40) ctx.fillRect(i,GROUND+8,20,3);
}

function drawHUD(){
  ctx.fillStyle=C.d;
  ctx.font=`bold 22px 'Bebas Neue'`;
  ctx.letterSpacing='2px';
  ctx.fillText(`PUNTOS: ${state.score}`,16,30);
  if(state.hi>0){
    ctx.fillStyle=C.t;
    ctx.fillText(`RÉCORD: ${state.hi}`,W-185,30);
  }
}

function drawStart(){
  ctx.fillStyle='rgba(0,0,0,0.52)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle=C.y;
  ctx.font=`bold 52px 'Bebas Neue'`;
  ctx.fillText('FIRULAIS RUNNER',W/2,H/2-28);
  ctx.fillStyle=C.w;
  ctx.font=`24px 'Bebas Neue'`;
  ctx.fillText('ESPACIO · TAP PARA SALTAR',W/2,H/2+16);
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.font=`16px 'Bebas Neue'`;
  ctx.fillText('🍋 +5  ·  🧂 +10  ·  ESQUIVA LAS VALLAS',W/2,H/2+46);
  ctx.textAlign='left';
}

function drawOver(){
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle=C.r;
  ctx.font=`bold 58px 'Bebas Neue'`;
  ctx.fillText('GAME OVER',W/2,H/2-30);
  ctx.fillStyle=C.y;
  ctx.font=`28px 'Bebas Neue'`;
  ctx.fillText(`PUNTOS: ${state.score}`,W/2,H/2+14);
  if(state.score>=state.hi && state.score>0){
    ctx.fillStyle=C.t;
    ctx.font=`20px 'Bebas Neue'`;
    ctx.fillText('🏆 NUEVO RÉCORD',W/2,H/2+42);
  }
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.font=`18px 'Bebas Neue'`;
  ctx.fillText('TAP · ESPACIO PARA REINICIAR',W/2,H/2+72);
  ctx.textAlign='left';
}

function collide(ax,ay,aw,ah, bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function act(){
  if(!state.started || state.over){
    if(state.over){
      const hi = Math.max(state.score,state.hi);
      state = newState();
      state.hi = hi;
    }
    state.started = true;
    state.running = true;
    return;
  }
  if(state.dog.grnd){
    state.dog.vy = -15;
    state.dog.grnd = false;
  }
}

function loop(){
  const s = state;

  if(s.running && !s.over){
    s.frame++;
    s.speed = Math.min(5 + s.frame*0.0028, 20);

    // physics
    s.dog.vy += 0.68;
    s.dog.y  += s.dog.vy;
    if(s.dog.y >= GROUND-64){
      s.dog.y = GROUND-64;
      s.dog.vy = 0;
      s.dog.grnd = true;
    }

    // spawn hurdle
    s.nextObs--;
    if(s.nextObs<=0){
      const h = 38+Math.random()*28;
      s.obs.push({x:W,y:GROUND-h,w:22+Math.random()*14,h});
      s.nextObs = 58+Math.random()*80 - Math.min(s.frame*0.05,20);
    }

    // spawn item
    s.nextItem--;
    if(s.nextItem<=0){
      s.items.push({x:W, y:GROUND-55-Math.random()*55, type:Math.random()<0.45?'salt':'lemon'});
      s.nextItem = 38+Math.random()*55;
    }

    // move
    s.obs   = s.obs.map(o=>({...o,x:o.x-s.speed})).filter(o=>o.x>-50);
    s.items = s.items.map(i=>({...i,x:i.x-s.speed})).filter(i=>i.x>-30);

    // dog hitbox (tight)
    const dx=s.dog.x+18, dy=s.dog.y+10, dw=48, dh=56;

    // obstacle collision
    for(const o of s.obs){
      if(collide(dx,dy,dw,dh, o.x+4,o.y,o.w-8,o.h)){
        s.over=true; s.running=false;
        if(s.score>s.hi) s.hi=s.score;
        break;
      }
    }

    // item collection
    s.items = s.items.filter(it=>{
      if(collide(dx,dy,dw,dh, it.x-18,it.y-20,36,36)){
        s.score += it.type==='salt' ? 10 : 5;
        return false;
      }
      return true;
    });

    // distance score
    if(s.frame%8===0) s.score++;
  }

  // draw
  drawBg();
  s.obs.forEach(o=>drawHurdle(o));
  s.items.forEach(it=>it.type==='lemon'?drawLemon(it):drawSalt(it));
  drawDog(s.dog, s.frame);
  drawHUD();
  if(!s.started) drawStart();
  if(s.over) drawOver();

  raf = requestAnimationFrame(loop);
}

// Controls
window.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); act(); }
});
cv.addEventListener('touchstart', e=>{ e.preventDefault(); act(); }, {passive:false});
cv.addEventListener('click', act);

// Start
raf = requestAnimationFrame(loop);
</script>
</body>
</html>
